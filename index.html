<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Champions - タイプ相性ツール</title>
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pokemon Champions</h1>
            <p>タイプ相性チェック & データ登録ツール</p>
        </header>

        <main>
            <section class="glass-card type-checker">
                <div class="card-header">
                    <h2>タイプ相性チェック</h2>
                    <button id="reset-all" class="btn-reset-all">↺ すべてリセット</button>
                </div>
                
                <div class="checker-grid">
                    <!-- 攻撃側 -->
                    <div class="input-group">
                        <div class="group-header">
                            <h3>使用する技のタイプ <span class="sub-text">(最大2つ)</span></h3>
                            <button id="reset-atk" class="btn-reset">リセット</button>
                        </div>
                        <div class="selected-types-display" id="display-atk">
                            <span class="placeholder-text">未選択</span>
                        </div>
                        <div class="type-grid" id="grid-atk">
                            <!-- JSでボタンが生成される -->
                        </div>
                    </div>

                    <div class="vs-divider">VS</div>

                    <!-- 防御側 -->
                    <div class="input-group">
                        <div class="group-header">
                            <h3>防御側のポケモンのタイプ <span class="sub-text">(最大2つ)</span></h3>
                            <button id="reset-def" class="btn-reset">リセット</button>
                        </div>
                        <div class="selected-types-display" id="display-def">
                            <span class="placeholder-text">未選択</span>
                        </div>
                        <div class="type-grid" id="grid-def">
                            <!-- JSでボタンが生成される -->
                        </div>
                    </div>
                </div>

                <!-- 結果 -->
                <div class="result-area">
                    <h3>相性結果</h3>
                    <div id="result-display" class="result-display">
                        <span class="placeholder-text">タイプを選択してください</span>
                    </div>
                    <div class="bookmark-actions">
                        <button id="btn-bookmark" class="btn-bookmark" disabled>⭐ この組み合わせをブックマーク</button>
                    </div>
                </div>
            </section>

            <!-- ブックマークリスト -->
            <section class="glass-card bookmark-section">
                <h2>⭐ ブックマークした対面</h2>
                <div id="bookmark-list" class="bookmark-list">
                    <p class="placeholder-text" style="font-size:0.9rem;">ブックマークはありません。</p>
                </div>
            </section>

            <section class="glass-card registration-section">
                <h2>データ手動登録 (仮実装)</h2>
                <p class="desc">後でポケモン情報や技・特性を登録できるようになるフォームです。</p>
                <form id="registration-form" class="reg-form">
                    <div class="form-row">
                        <div class="form-control">
                            <label>ポケモン名</label>
                            <input type="text" placeholder="例: ピカチュウ">
                        </div>
                        <div class="form-control">
                            <label>特性</label>
                            <input type="text" placeholder="例: せいでんき">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-control">
                            <label>タイプ1</label>
                            <select>
                                <option value="">選択してください</option>
                                <option>でんき</option>
                                <option>その他...</option>
                            </select>
                        </div>
                        <div class="form-control">
                            <label>タイプ2</label>
                            <select>
                                <option value="">なし</option>
                                <option>ひこう</option>
                                <option>その他...</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-control">
                        <label>覚える技 (カンマ区切り)</label>
                        <textarea placeholder="例: 10まんボルト, でんこうせっか, アイアンテール"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">登録する (Consoleに仮出力)</button>
                </form>
            </section>
        </main>

        <footer>
            <p>made by hiro/ヒロ</p>
            <p><a href="https://github.com/h1ro223" target="_blank">https://github.com/h1ro223</a></p>
        </footer>
    </div>
    <script src="./script.js"></script>
</body>
</html>
